name: GHI Engine Sync

on:
  schedule:
    - cron: '*/5 * * * *' # Runs every 5 minutes
  workflow_dispatch: # Allows you to run it manually for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install groq

      - name: Run GHI Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Commit and Push Results
        run: |
          git config --global user.name "GHI-Bot"
          git config --global user.email "ghi-bot@celsius.tech"
          git add shi_data.json
          git commit -m "System Sync: $(date)" || exit 0
          git push
