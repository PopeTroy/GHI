name: GHI Global Sync
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  audit-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install groq boto3 requests

      - name: Run GHI Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MASSIVE_ACCESS_KEY_ID: ${{ secrets.MASSIVE_ACCESS_KEY_ID }}
          MASSIVE_SECRET_KEY: ${{ secrets.MASSIVE_SECRET_KEY }}
          MASSIVE_ENDPOINT: ${{ secrets.MASSIVE_ENDPOINT }}
        run: python main.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "GHI: System Audit Sync"
          file_pattern: 'shi_data.json'
