name: GHI Global Diagnostic Sync
on:
  schedule:
    - cron: '*/15 * * * *' # Every 15 mins to stay under Alpha Vantage limits
  workflow_dispatch: # Allows you to click "Run workflow" manually

jobs:
  audit-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install groq requests

      - name: Run GHI Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          DEDICATED_KEY: ${{ secrets.DEDICATED_KEY }}
        run: python main.py

      - name: Commit and Push Results
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "GHI: World Diagnostic Live Update"
          file_pattern: 'shi_data.json'
