name: GHI Reset Sync
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

jobs:
  reset-job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install
        run: pip install groq

      - name: Run
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python main.py

      - name: Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "GHI: Mega Circuit Reset"
          file_pattern: 'shi_data.json'
